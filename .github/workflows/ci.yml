name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

  e2e-tests:
    name: E2E Tests (Playwright)
    if: false
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Run Playwright tests
        run: npx playwright test

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: failure()
    steps:
      - name: Send Telegram alert
        run: |
          FAILED_JOBS=""
          if [ "${{ needs.lint.result }}" = "failure" ]; then FAILED_JOBS="$FAILED_JOBS lint"; fi
          if [ "${{ needs.test.result }}" = "failure" ]; then FAILED_JOBS="$FAILED_JOBS tests"; fi
          if [ "${{ needs.build.result }}" = "failure" ]; then FAILED_JOBS="$FAILED_JOBS build"; fi

          MESSAGE="❌ MeeReizen CI gefaald!%0A%0AJobs:%20$FAILED_JOBS%0ACommit: ${{ github.sha }}%0ABranch: ${{ github.ref_name }}%0A%0ABekijk: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d "text=$MESSAGE"
